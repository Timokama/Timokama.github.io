<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopMart - Premium Online Shopping</title>
<link rel="stylesheet" href="e-commerce.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>

<header class="header">
  <div class="container">
    <nav class="nav">
      <a href="#" class="logo"><i class="fas fa-shopping-bag"></i> ShopMart</a>
      
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search products...">
        <i class="fas fa-search"></i>
      </div>
      
      <div class="nav-actions">
        <button class="btn-icon" id="themeBtn" onclick="toggleTheme()">
          <i class="fas fa-moon"></i>
        </button>
        <button class="btn-icon" onclick="toggleCart()">
          <i class="fas fa-shopping-cart"></i>
          <span class="cart-badge" id="cartBadge">0</span>
        </button>
      </div>
    </nav>
  </div>
</header>

<main class="container">
  <div class="categories" id="categories"></div>
  <div class="products-grid" id="products">
    <div class="loading">Loading products from server...</div>
  </div>
</main>

<!-- Cart Modal -->
<div class="modal" id="cartModal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Your Cart</h2>
      <button class="close-btn" onclick="toggleCart()"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body" id="cartItems"></div>
    <div class="modal-footer">
      <div class="total-row">
        <span>Total:</span>
        <span>KSH <span id="cartTotal">0</span></span>
      </div>
      
      <div class="checkout-form" id="checkoutForm">
        <input type="text" id="customerName" placeholder="Full Name" required>
        <input type="tel" id="customerPhone" placeholder="07XXXXXXXX" required>
        <input type="text" id="customerLocation" placeholder="Click map to set location" required readonly>
        <div id="map"></div>
        <small style="color:var(--muted)">Click on map to select delivery location</small>
      </div>
      
      <button class="checkout-btn" onclick="checkout()">
        <i class="fab fa-whatsapp"></i> Order via WhatsApp
      </button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="e-commerce.js"></script>
</body>
</html>
