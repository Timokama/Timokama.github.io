<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple E-commerce Store | Timokama</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: #f5f5f5; color:#333; }

    header {
      background:#0d6efd; color:#fff; padding:15px 20px;
      display:flex; justify-content:space-between; align-items:center;
      position:sticky; top:0; z-index:100;
    }
    header h2 { font-size:1.2rem; }
    .cart-icon { position:relative; cursor:pointer; font-size:1.4rem; }
    .cart-count {
      position:absolute; top:-8px; right:-10px;
      background:#ff4757; color:#fff; border-radius:50%;
      width:20px; height:20px; font-size:0.75rem;
      display:flex; align-items:center; justify-content:center;
    }

    .container { max-width: 1100px; margin:auto; padding:20px; }
    h1 { text-align:center; color:#0d6efd; margin:30px 0; }

    .products { display:grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap:20px; }
    .product-card {
      background:#fff; padding:20px; border-radius:10px; text-align:center;
      box-shadow:0 4px 10px rgba(0,0,0,0.1); transition: transform 0.3s, box-shadow 0.3s;
    }
    .product-card:hover { transform: translateY(-5px); box-shadow:0 8px 20px rgba(0,0,0,0.2); }
    .product-card img { width:100%; height:200px; object-fit:cover; border-radius:10px; margin-bottom:15px; }
    .product-card h3 { color:#0d6efd; margin-bottom:10px; }
    .product-card p { margin-bottom:10px; font-size:1.1rem; font-weight:600; color:#28a745; }
    .product-card button { 
      padding:10px 15px; background:#0d6efd; border:none; color:#fff; 
      border-radius:5px; cursor:pointer; transition:0.3s; width:100%;
    }
    .product-card button:hover { background:#084298; }

    .cart-overlay {
      position:fixed; top:0; right:-100%; width:100%; max-width:400px;
      height:100vh; background:#fff; box-shadow:-4px 0 15px rgba(0,0,0,0.2);
      transition:right 0.3s ease; z-index:200; display:flex; flex-direction:column;
    }
    .cart-overlay.open { right:0; }
    .cart-header {
      padding:20px; background:#0d6efd; color:#fff;
      display:flex; justify-content:space-between; align-items:center;
    }
    .cart-header button { background:none; border:none; color:#fff; font-size:1.5rem; cursor:pointer; }
    .cart-items { flex:1; overflow-y:auto; padding:20px; }
    .cart-item {
      display:flex; justify-content:space-between; align-items:center;
      padding:15px 0; border-bottom:1px solid #eee;
    }
    .cart-item-info { flex:1; }
    .cart-item-info h4 { font-size:0.95rem; margin-bottom:5px; }
    .cart-item-qty {
      display:flex; align-items:center; gap:10px; margin-top:5px;
    }
    .cart-item-qty button {
      width:25px; height:25px; border:none; background:#0d6efd; color:#fff;
      border-radius:4px; cursor:pointer;
    }
    .remove-btn { color:#ff4757; cursor:pointer; font-size:1.2rem; }
    .cart-footer { padding:20px; border-top:2px solid #eee; }
    .cart-footer button {
      width:100%; padding:12px; background:#28a745; color:#fff;
      border:none; border-radius:5px; font-weight:600; cursor:pointer;
    }
    .cart-footer button:hover { background:#218838; }
    .total { font-size:1.2rem; font-weight:700; margin-bottom:15px; }

    .empty-cart { text-align:center; color:#777; padding:40px 0; }
    .overlay-bg {
      position:fixed; top:0; left:0; width:100%; height:100%;
      background:rgba(0,0,0,0.5); display:none; z-index:199;
    }
    .overlay-bg.show { display:block; }

    @media (max-width:768px) {
      .cart-overlay { max-width:100%; }
    }
  </style>
</head>
<body>

  <header>
    <h2>TechStore</h2>
    <div class="cart-icon" onclick="toggleCart()">
      <i class="fas fa-shopping-cart"></i>
      <span class="cart-count" id="cart-count">0</span>
    </div>
  </header>

  <div class="container">
    <h1>Featured Products <i class="fas fa-store"></i></h1>

    <div class="products" id="products">
      <div class="product-card">
        <img src="/headphones.png" alt="Wireless Headphones" loading="lazy">
        <h3>Wireless Headphones</h3>
        <p>KSH 6,500</p>
        <button onclick="addToCart(1, 'Wireless Headphones', 6500)">Add to Cart <i class="fas fa-cart-plus"></i></button>
      </div>
      <div class="product-card">
        <img src="/smartwatch.png" alt="Smartwatch" loading="lazy">
        <h3>Smartwatch</h3>
        <p>KSH 10,400</p>
        <button onclick="addToCart(2, 'Smartwatch', 10400)">Add to Cart <i class="fas fa-cart-plus"></i></button>
      </div>
      <div class="product-card">
        <img src="/bluetooth-speaker.png" alt="Bluetooth Speaker" loading="lazy">
        <h3>Bluetooth Speaker</h3>
        <p>KSH 4,550</p>
        <button onclick="addToCart(3, 'Bluetooth Speaker', 4550)">Add to Cart <i class="fas fa-cart-plus"></i></button>
      </div>
    </div>
  </div>

  <!-- Cart Sidebar -->
  <div class="overlay-bg" id="overlay" onclick="toggleCart()"></div>
  <div class="cart-overlay" id="cart-overlay">
    <div class="cart-header">
      <h3>Your Cart</h3>
      <button onclick="toggleCart()"><i class="fas fa-times"></i></button>
    </div>
    <div class="cart-items" id="cart-items"></div>
    <div class="cart-footer">
      <div class="total">Total: KSH <span id="cart-total">0</span></div>
      <button onclick="checkout()">Checkout <i class="fas fa-arrow-right"></i></button>
    </div>
  </div>

  <script>
    let cart = JSON.parse(localStorage.getItem('cart')) || [];

    function formatKSH(amount) {
      return amount.toLocaleString('en-KE');
    }

    function addToCart(id, name, price) {
      const existing = cart.find(item => item.id === id);
      if (existing) {
        existing.qty += 1;
      } else {
        cart.push({ id, name, price, qty: 1 });
      }
      saveCart();
      updateCart();
      toggleCart();
    }

    function updateQty(id, change) {
      const item = cart.find(item => item.id === id);
      if (!item) return;
      item.qty += change;
      if (item.qty <= 0) {
        cart = cart.filter(i => i.id !== id);
      }
      saveCart();
      updateCart();
    }

    function removeItem(id) {
      cart = cart.filter(item => item.id !== id);
      saveCart();
      updateCart();
    }

    function updateCart() {
      const cartItems = document.getElementById('cart-items');
      const cartTotal = document.getElementById('cart-total');
      const cartCount = document.getElementById('cart-count');

      if (cart.length === 0) {
        cartItems.innerHTML = '<div class="empty-cart">Your cart is empty</div>';
        cartTotal.innerText = '0';
        cartCount.innerText = '0';
        return;
      }

      let total = 0;
      let count = 0;
      cartItems.innerHTML = '';

      cart.forEach(item => {
        total += item.price * item.qty;
        count += item.qty;
        cartItems.innerHTML += `
          <div class="cart-item">
            <div class="cart-item-info">
              <h4>${item.name}</h4>
              <p>KSH ${formatKSH(item.price)} x ${item.qty}</p>
              <div class="cart-item-qty">
                <button onclick="updateQty(${item.id}, -1)">-</button>
                <span>${item.qty}</span>
                <button onclick="updateQty(${item.id}, 1)">+</button>
              </div>
            </div>
            <i class="fas fa-trash remove-btn" onclick="removeItem(${item.id})"></i>
          </div>
        `;
      });

      cartTotal.innerText = formatKSH(total);
      cartCount.innerText = count;
    }

    function saveCart() {
      localStorage.setItem('cart', JSON.stringify(cart));
    }

    function toggleCart() {
      document.getElementById('cart-overlay').classList.toggle('open');
      document.getElementById('overlay').classList.toggle('show');
    }

    function checkout() {
      if (cart.length === 0) {
        alert('Your cart is empty!');
        return;
      }
      alert('Checkout coming soon! Connect this to M-Pesa STK Push.');
    }

    updateCart();
  </script>

</body>
</html>
