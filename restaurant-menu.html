<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurant Menu - TasteHub</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --primary: #d62828;
      --dark: #1a1a1a;
      --light: #f8f9fa;
      --card: #ffffff;
      --border: #e0e0e0;
      --gray: #666;
      --accent: #fcbf49;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: var(--light); color: var(--dark); }
    
    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { color: var(--primary); font-size: 1.8rem; }
    .cart-btn {
      background: var(--primary); color: #fff; border: none;
      padding: 10px 16px; border-radius: 8px; cursor: pointer;
      position: relative; font-size: 1rem;
    }
    .cart-badge {
      position: absolute; top: -8px; right: -8px;
      background: var(--accent); color: #000; border-radius: 50%;
      width: 22px; height: 22px; font-size: 0.8rem;
      display: flex; align-items: center; justify-content: center; font-weight: 600;
    }
    
    .categories {
      display: flex; overflow-x: auto; gap: 10px;
      padding: 16px; max-width: 1200px; margin: 0 auto;
    }
    .categories::-webkit-scrollbar { display: none; }
    .cat-btn {
      padding: 10px 20px; border: 2px solid var(--primary);
      border-radius: 25px; background: var(--card); color: var(--primary);
      white-space: nowrap; cursor: pointer; font-weight: 600; transition: 0.2s;
    }
    .cat-btn.active,.cat-btn:hover {
      background: var(--primary); color: #fff;
    }
    
    .menu-section {
      max-width: 1200px; margin: 0 auto; padding: 20px 16px 100px;
    }
    .menu-section h2 { margin-bottom: 20px; font-size: 1.5rem; }
    
    .menu-grid {
      display: grid; gap: 20px;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    }
    
    /* E-commerce card style */
    .menu-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: all 0.25s ease;
      display: flex; flex-direction: column;
    }
    .menu-item:hover {
      box-shadow: 0 6px 16px rgba(0,0,0,0.1);
      transform: translateY(-4px);
    }
    
    .img-wrap {
      width: 100%;
      height: 200px;
      background: #f2f2f2;
      overflow: hidden;
    }
    .menu-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    
    .menu-item-info {
      padding: 16px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }
    .menu-item-info h3 {
      margin-bottom: 6px;
      font-size: 1.1rem;
      font-weight: 600;
    }
    .menu-item-info p {
      color: var(--gray);
      font-size: 0.9rem;
      margin-bottom: 14px;
      flex: 1;
    }
    .price-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
    }
    .price-badge {
      background: var(--primary);
      color: #fff;
      padding: 8px 14px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 0.95rem;
    }
    .add-cart-btn {
      background: var(--dark);
      color: #fff;
      border: none;
      padding: 8px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: 0.2s;
    }
    .add-cart-btn:hover {
      background: var(--primary);
    }
    
    .modal {
      display: none; position: fixed; top: 0; left: 0;
      width: 100%; height: 100%; background: rgba(0,0,0,0.7);
      z-index: 30; padding: 20px; overflow-y: auto;
    }
    .modal.open { display: flex; align-items: center; justify-content: center; }
    .modal-content {
      background: var(--card); max-width: 500px; width: 100%;
      padding: 24px; border-radius: 12px;
    }
    .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 20px;
    }
    .close-x {
      background: none; border: none; font-size: 1.5rem;
      cursor: pointer; color: var(--gray);
    }
    .cart-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 0; border-bottom: 1px solid var(--border);
    }
    .cart-qty {
      display: flex; align-items: center; gap: 8px;
    }
    .cart-qty button {
      width: 28px; height: 28px; border: 1px solid var(--border);
      background: var(--card); border-radius: 6px; cursor: pointer;
    }
    .cart-total {
      font-size: 1.3rem; font-weight: 700; text-align: right; margin: 20px 0;
    }
    .checkout-btn {
      width: 100%; background: #25D366; color: #fff; border: none;
      padding: 14px; border-radius: 8px; cursor: pointer;
      font-weight: 600; font-size: 1rem;
    }
    
    footer {
      background: var(--dark); color: var(--light); margin-top: 60px;
    }
    .footer-content {
      max-width: 1200px; margin: 0 auto; padding: 40px 16px;
      display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 32px;
    }
    .footer-col h4 { color: var(--accent); margin-bottom: 16px; font-size: 1rem; }
    .footer-col p,.footer-col li {
      color: #ccc; font-size: 0.9rem; margin-bottom: 8px;
    }
    .footer-col ul { list-style: none; padding: 0; }
    .footer-col a { color: #ccc; text-decoration: none; transition: 0.2s; }
    .footer-col a:hover { color: var(--accent); }
    .footer-bottom {
      text-align: center; padding: 20px 16px;
      border-top: 1px solid #333; color: #999; font-size: 0.85rem;
    }
    
    @media (max-width: 768px) {
    .menu-grid { grid-template-columns: 1fr; }
    .footer-content { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <h1><i class="fas fa-utensils"></i> TasteHub</h1>
      <button class="cart-btn" onclick="toggleCart()">
        <i class="fas fa-shopping-cart"></i>
        <span class="cart-badge" id="cartBadge">0</span>
      </button>
    </div>
  </header>

  <div class="categories" id="categories"></div>
  <div class="menu-section" id="menu"></div>

  <div class="modal" id="cartModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Your Cart</h2>
        <button class="close-x" onclick="toggleCart()">&times;</button>
      </div>
      <div id="cartItems"></div>
      <div class="cart-total">
        Total: KSH <span id="cartTotal">0</span>
      </div>
      <button class="checkout-btn" onclick="checkout()">
        <i class="fab fa-whatsapp"></i> Checkout on WhatsApp
      </button>
    </div>
  </div>

  <footer>
    <div class="footer-content">
      <div class="footer-col">
        <h4>TasteHub</h4>
        <p>Fresh food, fast delivery. Order your favorite meals online.</p>
      </div>
      <div class="footer-col">
        <h4>Quick Links</h4>
        <ul>
          <li><a href="restaurant-menu.html">All</a></li>
          <li><a href="restaurant-menu.html#Burgers">Burgers</a></li>
          <li><a href="restaurant-menu.html#Pizza">Pizza</a></li>
          <li><a href="restaurant-menu.html#Drinks">Drinks</a></li>
          <li><a href="restaurant-menu.html#Desserts">Desserts</a></li>
        </ul>
      </div>
      <div class="footer-col">
        <h4>Customer Service</h4>
        <ul>
         
          <li><a href="contact.html">Contact Us</a></li>
          <li><a href="restaurant-returns.html">Returns</a></li>
          <li><a href="faqrestaurant.html">FAQ</a></li>
        </ul>
      </div>
    </div>
    <div class="footer-bottom">
      <p>© 2026 TasteHub. All rights reserved. | Nairobi, Kenya</p>
    </div>
  </footer>

  <script>
    const WHATSAPP_NUMBER = "254768394866";

    const menuData = {
      categories: ['All', 'Burgers', 'Pizza', 'Drinks', 'Desserts', 'Snacks'],
      items: [
        // Burgers
        {id: 1, name: "Classic Burger", desc: "Beef patty, lettuce, tomato, cheese, house sauce", price: 450, category: "Burgers", image: "https://images.pexels.com/photos/5488046/pexels-photo-5488046.jpeg?auto=compress&cs=tinysrgb&w=600"},
        {id: 2, name: "Cheese Burger", desc: "Double cheese, beef patty, pickles, onion", price: 550, category: "Burgers", image: "https://images.pexels.com/photos/12420469/pexels-photo-12420469.jpeg?auto=compress&cs=tinysrgb&w=600"},
        {id: 9, name: "BBQ Bacon Burger", desc: "Smoky BBQ sauce, crispy bacon, cheddar", price: 650, category: "Burgers", image: "https://images.pexels.com/photos/11653560/pexels-photo-11653560.jpeg?auto=compress&cs=tinysrgb&w=600"},
    
        // Pizza
        {id: 3, name: "Pepperoni Pizza", desc: "Crispy pepperoni, mozzarella, tomato sauce", price: 900, category: "Pizza", image: "https://images.pexels.com/photos/825661/pexels-photo-825661.jpeg?auto=compress&cs=tinysrgb&w=600"},
        {id: 4, name: "Margherita Pizza", desc: "Tomato, mozzarella, fresh basil, olive oil", price: 800, category: "Pizza", image: "https://images.pexels.com/photos/2619970/pexels-photo-2619970.jpeg?auto=compress&cs=tinysrgb&w=600"},
        {id: 10, name: "Veggie Supreme", desc: "Bell peppers, mushrooms, onions, olives", price: 850, category: "Pizza", image: "https://images.pexels.com/photos/1260968/pexels-photo-1260968.jpeg?auto=compress&cs=tinysrgb&w=600"},
    
        // Drinks
        {id: 5, name: "Fresh Juice", desc: "Passion & Mango blend, no added sugar", price: 120, category: "Drinks", image: "https://images.pexels.com/photos/96974/pexels-photo-96974.jpeg?auto=compress&cs=tinysrgb&w=600"},
        {id: 6, name: "Milkshake", desc: "Strawberry milkshake with whipped cream", price: 180, category: "Drinks", image: "https://images.pexels.com/photos/1362534/pexels-photo-1362534.jpeg?auto=compress&cs=tinysrgb&w=600"},
        {id: 11, name: "Iced Coffee", desc: "Cold brew with milk and vanilla syrup", price: 150, category: "Drinks", image: "https://images.pexels.com/photos/312418/pexels-photo-312418.jpeg?auto=compress&cs=tinysrgb&w=600"},
    
        // Desserts
        {id: 7, name: "Chocolate Cake", desc: "Moist chocolate slice with cream frosting", price: 200, category: "Desserts", image: "https://images.pexels.com/photos/291528/pexels-photo-291528.jpeg?auto=compress&cs=tinysrgb&w=600"},
        
        // Ice Cream Sundae - UPDATED
        {id: 8, name: "Ice Cream Sundae", desc: "Vanilla ice cream with syrup, nuts, cherry", price: 180, category: "Desserts", image: "https://images.pexels.com/photos/1352278/pexels-photo-1352278.jpeg?auto=compress&cs=tinysrgb&w=600"},
        
        {id: 12, name: "Apple Pie", desc: "Warm apple pie with cinnamon and ice cream", price: 220, category: "Desserts", image: "https://images.pexels.com/photos/6163273/pexels-photo-6163273.jpeg?auto=compress&cs=tinysrgb&w=600"},
    
        // Snacks
        {id: 13, name: "Chicken Wings", desc: "Spicy buffalo wings, 6 pcs with dip", price: 400, category: "Snacks", image: "https://images.pexels.com/photos/2338407/pexels-photo-2338407.jpeg?auto=compress&cs=tinysrgb&w=600"},
        {id: 14, name: "French Fries", desc: "Crispy golden fries with ketchup", price: 150, category: "Snacks", image: "https://images.pexels.com/photos/1583884/pexels-photo-1583884.jpeg?auto=compress&cs=tinysrgb&w=600"}
      ]
    };
    
    // ... rest of your JS stays the same
    let currentCat = 'All';
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    
    function renderCategories() {
      const catDiv = document.getElementById('categories');
      catDiv.innerHTML = menuData.categories.map(cat =>
        `<button class="cat-btn ${cat === currentCat? 'active' : ''}" onclick="filterMenu('${cat}')">${cat}</button>`
      ).join('');
    }
    
    function renderMenu() {
      const menuDiv = document.getElementById('menu');
      const filtered = currentCat === 'All'
      ? menuData.items
        : menuData.items.filter(i => i.category === currentCat);
    
      menuDiv.innerHTML = `<h2>${currentCat}</h2><div class="menu-grid"></div>`;
      const grid = menuDiv.querySelector('.menu-grid');
    
      if (filtered.length === 0) {
        grid.innerHTML = '<p style="text-align:center; color:#666; padding:40px;">No items in this category yet.</p>';
        return;
      }
    
      grid.innerHTML = filtered.map(item => `
        <div class="menu-item">
          <div class="img-wrap">
            <img src="${item.image}" alt="${item.name}" loading="lazy"
                 onerror="this.src='https://via.placeholder.com/600x400?text=No+Image'">
          </div>
          <div class="menu-item-info">
            <h3>${item.name}</h3>
            <p>${item.desc}</p>
            <div class="price-row">
              <div class="price-badge">KSH ${item.price.toLocaleString()}</div>
              <button class="add-cart-btn" onclick="addToCart(${item.id})">Add</button>
            </div>
          </div>
        </div>
      `).join('');
    }
    
    function filterMenu(cat) {
      currentCat = cat;
      window.location.hash = cat === 'All'? '' : cat;
      renderCategories();
      renderMenu();
    }
    
    function addToCart(id) {
      const item = menuData.items.find(i => i.id === id);
      const existing = cart.find(i => i.id === id);
      if (existing) existing.qty += 1;
      else cart.push({...item, qty: 1});
      saveCart();
    }
    
    function saveCart() {
      localStorage.setItem('cart', JSON.stringify(cart));
      updateCartBadge();
    }
    
    function updateCartBadge() {
      const total = cart.reduce((sum, item) => sum + item.qty, 0);
      document.getElementById('cartBadge').textContent = total;
    }
    
    function toggleCart() {
      renderCart();
      document.getElementById('cartModal').classList.toggle('open');
    }
    
    function renderCart() {
      const cartDiv = document.getElementById('cartItems');
      const totalEl = document.getElementById('cartTotal');
    
      if (cart.length === 0) {
        cartDiv.innerHTML = '<p style="text-align:center; color:#666;">Your cart is empty</p>';
        totalEl.textContent = '0';
        return;
      }
    
      let total = 0;
      cartDiv.innerHTML = cart.map(item => {
        total += item.price * item.qty;
        return `
          <div class="cart-item">
            <div>
              <strong>${item.name}</strong><br>
              <small>KSH ${item.price} x ${item.qty}</small>
            </div>
            <div class="cart-qty">
              <button onclick="updateQty(${item.id}, -1)">-</button>
              ${item.qty}
              <button onclick="updateQty(${item.id}, 1)">+</button>
            </div>
          </div>
        `;
      }).join('');
    
      totalEl.textContent = total.toLocaleString();
    }
    
    function updateQty(id, change) {
      const item = cart.find(i => i.id === id);
      if (!item) return;
      item.qty += change;
      if (item.qty <= 0) cart = cart.filter(i => i.id!== id);
      saveCart();
      renderCart();
    }
    
    function checkout() {
      if (cart.length === 0) return alert('Cart is empty');
    
      let message = 'New Order from TasteHub\n';
      let total = 0;
      cart.forEach(item => {
        message += `${item.name} x${item.qty} - KSH ${item.price * item.qty}\n`;
        total += item.price * item.qty;
      });
      message += `\nTotal: KSH ${total}`;
    
      window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`, '_blank');
      cart = [];
      saveCart();
      toggleCart();
    }
    
    function setCategoryFromHash() {
      const hash = decodeURIComponent(window.location.hash.replace('#', ''));
      if (menuData.categories.includes(hash)) {
        currentCat = hash;
      }
    }
    
    window.addEventListener('hashchange', () => {
      setCategoryFromHash();
      renderCategories();
      renderMenu();
    });
    
    // Init
    setCategoryFromHash();
    renderCategories();
    renderMenu();
    updateCartBadge();
  </script>
</body>
</html>
